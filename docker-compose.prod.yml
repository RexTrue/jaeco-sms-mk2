version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: jaecoo-postgres
    environment:
      POSTGRES_DB: jaecoo_prod
      POSTGRES_USER: jaecoo_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - jaecoo-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jaecoo_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jaecoo-backend
    environment:
      DATABASE_URL: postgresql://jaecoo_user:${DB_PASSWORD}@postgres:5432/jaecoo_prod
      NODE_ENV: production
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-12}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-120}
      AUTH_RATE_LIMIT_MAX: ${AUTH_RATE_LIMIT_MAX:-20}
    expose:
      - "3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - jaecoo-network
    volumes:
      - ./backend/logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
        VITE_ENABLE_DEMO_AUTH: ${VITE_ENABLE_DEMO_AUTH:-false}
    container_name: jaecoo-frontend
    expose:
      - "5173"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - jaecoo-network

  nginx:
    image: nginx:1.27-alpine
    container_name: jaecoo-nginx
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      # Uncomment after TLS certificates are mounted and configured.
      # - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    networks:
      - jaecoo-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:

networks:
  jaecoo-network:
    driver: bridge
